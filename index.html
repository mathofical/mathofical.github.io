<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MUSH STATS</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <style>
    :root {
      --indigo-dark: #4b0082;
      --indigo-light: #7f00ff;
      --bg: #111;
      --fg: #fff;
    }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 20px;
    }
    input, select, button {
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      outline: none;
    }
    input, select {
      width: 200px;
      margin: 0 5px;
    }
    button {
      background: var(--indigo-dark);
      color: var(--fg);
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: var(--indigo-light);
      color: #000;
    }
    .resultado {
      margin: 40px auto;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 12px;
      max-width: 600px;
      text-align: left;
      box-shadow: 0 0 10px #0008;
    }
    .resultado img {
      display: block;
      margin: 0 auto 10px;
      border-radius: 8px;
    }
    .field {
      margin: 6px 0;
    }
    .label {
      font-weight: bold;
    }
    .hoverable:hover {
      color: var(--indigo-light);
      transition: 0.2s;
    }
    .rank-btn {
      margin-left: 10px;
      padding: 2px 6px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 4px;
      background: var(--indigo-light);
      color: #000;
      border: none;
    }
    hr {
      border-color: #444;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <h2 class="hoverable">MUSH STATS</h2>
  <p>
    Nick:
    <input id="nickInput" placeholder="Ex: apxguei" />
    <button id="btnBuscar">Buscar</button>
  </p>
  <p>
    Modo:
    <select id="modeSelect">
      <option value="bedwars">BedWars</option>
      <option value="bed_fight">Bed Fight</option>
    </select>
  </p>
  <div id="resultado" class="resultado"></div>
  <script src="script.js"></script>
</body>
</html>
